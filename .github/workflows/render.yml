name: Render pipeline

# Builds the full audit pipeline on every push and PR. Uploads the
# generated artifacts so reviewers can download HTML / PDF / xlsx
# without running R locally.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  R_KEEP_PKG_SOURCE: yes
  RENV_PATHS_ROOT: ~/.cache/R/renv
  PROJECT_ROOT: ${{ github.workspace }}

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build database
        run: ./setup.sh

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.5'
          use-public-rspm: true

      - name: Set up pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true

      - name: Install LuaLaTeX support packages
        run: |
          quarto install tinytex --no-prompt || true
          tlmgr install scrlayer-scrpage koma-script booktabs colortbl array \
            xcolor enumitem parskip amsfonts amssymb cleveref \
            longtable multirow wrapfig changepage caption \
            etoolbox || true

      - name: Cache renv
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/R/renv
            renv/library
          key: renv-${{ runner.os }}-${{ hashFiles('renv.lock') }}
          restore-keys: |
            renv-${{ runner.os }}-

      - name: Restore R packages
        uses: r-lib/actions/setup-renv@v2

      - name: Run pipeline
        run: Rscript R/run_all.R
        env:
          PROJECT_ROOT: ${{ github.workspace }}

      - name: Upload output artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-pipeline-output
          path: |
            output/
            quarto/report.html
            quarto/report.pdf
            quarto/dashboard.html
            quarto/tearsheet.pdf
          retention-days: 30
          if-no-files-found: warn

      - name: Pipeline summary
        if: success()
        run: |
          echo '## Pipeline summary' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '| Artifact | Size |' >> "$GITHUB_STEP_SUMMARY"
          echo '|---|---:|' >> "$GITHUB_STEP_SUMMARY"
          for f in \
            output/cinderhaven_audit.xlsx \
            output/compliance_timeline.pdf \
            output/scorecard.pdf \
            quarto/report.html \
            quarto/report.pdf \
            quarto/dashboard.html \
            quarto/tearsheet.pdf ; do
            if [ -f "$f" ]; then
              size=$(du -h "$f" | cut -f1)
              echo "| \`$f\` | $size |" >> "$GITHUB_STEP_SUMMARY"
            fi
          done
